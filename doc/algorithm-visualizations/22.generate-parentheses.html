<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>括号生成 · 图解 · LeetCode 22</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #faf7f2;
    --paper-2: #f2ede4;
    ink: #1c1917;
    --muted: #57534e;
    --soft: #78716c;
    --rule: rgba(28,25,23,0.12);
    --accent: #b5523a;
    --accent-tint: rgba(181,82,58,0.08);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); font-family: 'Geist', sans-serif; -webkit-font-smoothing: antialiased; }
  body { background-image: radial-gradient(rgba(28,25,23,0.08) 1px, transparent 1px); background-size: 22px 22px; padding: 64px 32px 96px; }
  .container { max-width: 960px; margin: 0 auto; }
  .eyebrow { font-family: 'Geist Mono', monospace; font-size: 8px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin: 0 0 12px; }
  h1 { font-family: 'Instrument Serif', serif; font-size: 2.25rem; font-weight: 400; margin: 0 0 12px; line-height: 1.15; }
  .subtitle { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 1.125rem; color: var(--muted); margin: 0 0 48px; }
  section { background: var(--paper-2); border: 1px solid var(--rule); border-radius: 8px; padding: 32px; margin-bottom: 32px; }
  section h2 { font-family: 'Instrument Serif', serif; font-size: 1.5rem; font-weight: 400; margin: 0 0 8px; }
  .section-sub { font-size: 12px; color: var(--muted); margin: 0 0 24px; line-height: 1.6; }
  .section-sub code { font-family: 'Geist Mono', monospace; font-size: 12px; background: rgba(28,25,23,0.05); padding: 1px 5px; border-radius: 3px; }
  .section-sub strong { color: var(--ink); font-weight: 600; }

  .bracket-row { display: flex; gap: 4px; align-items: center; justify-content: center; margin: 16px 0; flex-wrap: wrap; }
  .bkt { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-family: 'Geist Mono', monospace; font-size: 18px; font-weight: 700; border-radius: 4px; }
  .bkt.o { background: #dcfce7; color: #16a34a; border: 1px solid #86efac; }
  .bkt.c { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
  .bkt.empty { background: var(--paper); border: 1px dashed var(--rule); color: var(--soft); }

  .combo-row { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0; }
  .combo { font-family: 'Geist Mono', monospace; font-size: 14px; padding: 6px 12px; border-radius: 6px; background: var(--paper); border: 1px solid var(--rule); color: var(--muted); }
  .combo.current { border-color: var(--accent); color: var(--accent); background: var(--accent-tint); }
  .combo.done { background: #dcfce7; border-color: #16a34a; color: #16a34a; }
  .combo.pruned { background: #fee2e2; border-color: #fecaca; color: #991b1b; opacity: 0.5; }

  .step { background: var(--paper); border: 1px solid var(--rule); border-radius: 6px; padding: 20px; margin: 12px 0; }
  .step-head { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .step-num { font-family: 'Geist Mono', monospace; font-size: 9px; font-weight: 600; background: var(--accent); color: white; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  .step-range { font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--muted); }
  .decision { background: var(--paper-2); border-radius: 4px; padding: 12px 16px; margin-top: 12px; }
  .kv { font-size: 13px; color: var(--muted); margin: 4px 0; line-height: 1.5; }
  .kv code { font-family: 'Geist Mono', monospace; font-size: 12px; background: rgba(28,25,23,0.05); padding: 1px 5px; border-radius: 3px; }
  .kv.focal { color: var(--accent); font-weight: 600; }
  .kv.done { color: #16a34a; }
  .kv.warn { color: #dc2626; }

  pre { background: var(--ink); color: #e8e4dc; border-radius: 8px; padding: 24px; overflow-x: auto; font-size: 13px; line-height: 1.7; margin: 0; }

  .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-top: 32px; }
  .summary .card { background: var(--paper-2); border: 1px solid var(--rule); border-radius: 8px; padding: 20px; }
  .summary .card-eyebrow { font-family: 'Geist Mono', monospace; font-size: 8px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin: 0 0 8px; }
  .summary .card h3 { font-family: 'Instrument Serif', serif; font-size: 1rem; font-weight: 400; margin: 0 0 8px; }
  .summary .card p { font-size: 12px; color: var(--muted); margin: 0; line-height: 1.6; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--accent); margin-right: 6px; }

  footer { text-align: center; font-size: 11px; color: var(--soft); padding: 32px; margin-top: 32px; border-top: 1px solid var(--rule); }

  /* ── 动画演示 ── */
  .anim-controls { display: flex; gap: 8px; justify-content: center; margin: 24px 0 16px; }
  .anim-controls button { font-family: 'Geist Mono', monospace; font-size: 12px; font-weight: 600; padding: 8px 20px; border-radius: 6px; border: 1px solid var(--rule); background: var(--paper); color: var(--ink); cursor: pointer; transition: all 0.15s; }
  .anim-controls button:hover { background: var(--accent); color: white; border-color: var(--accent); }
  .anim-controls button:disabled { opacity: 0.35; cursor: default; }
  .anim-controls button:disabled:hover { background: var(--paper); color: var(--ink); border-color: var(--rule); }

  .anim-info-bar { display: flex; gap: 16px; justify-content: center; margin-bottom: 20px; font-family: 'Geist Mono', monospace; font-size: 12px; color: var(--muted); }
  .anim-info-bar span { background: var(--paper); border: 1px solid var(--rule); padding: 4px 12px; border-radius: 4px; }
  .anim-info-bar .hi { color: var(--accent); font-weight: 600; }

  .anim-phase { text-align: center; font-size: 12px; color: var(--soft); margin-bottom: 8px; font-family: 'Geist Mono', monospace; min-height: 18px; }

  .anim-path-display { display: flex; gap: 4px; justify-content: center; margin: 12px 0; min-height: 44px; align-items: center; }
  .anim-path-display .pc { font-family: 'Geist Mono', monospace; font-size: 20px; font-weight: 700; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 4px; border: 2px solid transparent; transition: all 0.2s; }
  .anim-path-display .pc.o { background: #dcfce7; color: #16a34a; border-color: #86efac; }
  .anim-path-display .pc.c { background: #fee2e2; color: #dc2626; border-color: #fecaca; }
  .anim-path-display .pc.new { transform: scale(1.3); box-shadow: 0 0 0 3px var(--accent); }

  .anim-tree { display: flex; flex-direction: column; gap: 4px; margin: 16px 0; }
  .anim-node { font-family: 'Geist Mono', monospace; font-size: 12px; padding: 6px 14px; border-radius: 4px; background: var(--paper); border: 1px solid var(--rule); color: var(--muted); display: inline-block; transition: all 0.2s; }
  .anim-node.active { border-color: var(--accent); color: var(--accent); background: var(--accent-tint); font-weight: 600; }
  .anim-node.done { background: #dcfce7; border-color: #16a34a; color: #16a34a; }

  .result-chips { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
  .result-chip { font-family: 'Geist Mono', monospace; font-size: 13px; padding: 6px 14px; border-radius: 6px; background: var(--paper); border: 1px solid var(--rule); color: var(--muted); transition: all 0.25s; }
  .result-chip.fresh { background: var(--accent-tint); border-color: var(--accent); color: var(--accent); font-weight: 600; transform: scale(1.08); box-shadow: 0 2px 8px rgba(181,82,58,0.2); }
</style>
</head>
<body>
<div class="container">

  <p class="eye

...

<h3>复杂度分析</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px;">
      <div style="background:var(--paper);border:1px solid var(--rule);border-radius:6px;padding:16px;">
        <p style="font-family:'Geist Mono',monospace;font-size:11px;color:var(--accent);margin:0 0 8px;font-weight:600;">时间复杂度</p>
        <p style="font-size:14px;color:var(--ink);margin:0;font-weight:600;">O(Catalan(n))</p>
        <p style="font-size:12px;color:var(--muted);margin:4px 0 0;">O(4ⁿ / n^(3/2))，第 n 个卡特兰数</p>
      </div>
      <div style="background:var(--paper);border:1px solid var(--rule);border-radius:6px;padding:16px;">
        <p style="font-family:'Geist Mono',monospace;font-size:11px;color:var(--accent);margin:0 0 8px;font-weight:600;">空间复杂度</p>
        <p style="font-size:14px;color:var(--ink);margin:0;font-weight:600;">O(n)</p>
        <p style="font-size:12px;color:var(--muted);margin:4px 0 0;">递归深度 = n</p>
      </div>
    </div>
  </section>

  <!-- Summary -->
  <div class="summary">
    <div class="card">
      <p class="card-eyebrow">本质</p>
      <h3><span class="dot"></span>卡特兰数</h3>
      <p>合法括号序列数 = 第 n 个卡特兰数</p>
    </div>
    <div class="card">
      <p class="card-eyebrow">约束</p>
      <h3><span class="dot"></span>两个剪枝条件</h3>
      <p>左&lt;n时加'('，右&lt;左时加')'</p>
    </div>
    <div class="card">
      <p class="card-eyebrow">模板</p>
      <h3><span class="dot"></span>index 位置无关</h3>
      <p>只用 open 和 close 计数控制</p>
    </div>
  </div>

<!-- 互动演示 -->
  <section id="anim" style="display:none;">
    <h2>互动演示</h2>
    <p class="section-sub">回溯算法 step-by-step 展开，n=3</p>

    <div class="anim-phase" id="a22-phase"></div>

    <div class="anim-info-bar">
      <span>open = <span id="a22-oc" class="hi">0</span></span>
      <span>close = <span id="a22-cc" class="hi">0</span></span>
      <span>path = <span id="a22-path" class="hi">""</span></span>
    </div>

    <div class="anim-path-display" id="a22-path-display"></div>

    <div class="anim-tree" id="a22-tree"></div>

    <div class="anim-controls">
      <button id="a22-reset" onclick="a22Reset()">Reset</button>
      <button id="a22-prev" onclick="a22Prev()" disabled>Prev</button>
      <button id="a22-next" onclick="a22Next()">Next</button>
    </div>

    <div class="result-chips" id="a22-chips"></div>
  </section>

</div>
<footer>doc/algorithm-visualizations/22.generate-parentheses.html</footer>

<script>
(function () {
  var N = 3;
  var results = [];
  var steps = [];
  var stepIdx = 0;

  function generateSteps(path, open, close) {
    if (open === N && close === N) {
      steps.push({ type: 'result', path: path, open: open, close: close });
      return;
    }
    if (open < N) {
      steps.push({ type: 'add', char: '(', path: path + '(', open: open + 1, close: close, branch: 'open' });
      generateSteps(path + '(', open + 1, close);
      steps.push({ type: 'back', open: open, close: close, path: path });
    }
    if (close < open) {
      steps.push({ type: 'add', char: ')', path: path + ')', open: open, close: close + 1, branch: 'close' });
      generateSteps(path + ')', open, close + 1);
      if (!(open === N && close === N - 1)) {
        steps.push({ type: 'back', open: open, close: close, path: path });
      }
    }
  }

  function renderPathDisplay(path, newIdx) {
    var el = document.getElementById('a22-path-display');
    el.innerHTML = '';
    for (var i = 0; i < path.length; i++) {
      var span = document.createElement('span');
      span.className = 'pc ' + (path[i] === '(' ? 'o' : 'c');
      if (i === newIdx) span.className += ' new';
      span.textContent = path[i];
      el.appendChild(span);
    }
  }

  function renderTree(idx) {
    var el = document.getElementById('a22-tree');
    el.innerHTML = '';
    var cap = Math.min(idx + 5, steps.length);
    for (var i = Math.max(0, idx - 2); i < cap; i++) {
      var s = steps[i];
      var node = document.createElement('div');
      node.className = 'anim-node';
      var label = '';
      if (s.type === 'add') label = (s.branch === 'open' ? 'add "("' : 'add ")"') + ' → "' + s.path + '"';
      else if (s.type === 'back') label = 'backtrack from "' + s.path + '"';
      else if (s.type === 'result') label = '✓ result: "' + s.path + '"';
      node.textContent = (i + 1) + '. ' + label;
      if (i === idx) node.className += ' active';
      else if (s.type === 'result' && results.indexOf(s.path) !== -1) node.className += ' done';
      el.appendChild(node);
    }
  }

  function renderChips(freshPath) {
    var el = document.getElementById('a22-chips');
    el.innerHTML = '';
    for (var i = 0; i < results.length; i++) {
      var chip = document.createElement('span');
      chip.className = 'result-chip' + (results[i] === freshPath ? ' fresh' : '');
      chip.textContent = results[i];
      el.appendChild(chip);
    }
  }

  function updateUI(msg) {
    var s = steps[stepIdx];
    document.getElementById('a22-phase').textContent = msg || '';
    document.getElementById('a22-oc').textContent = s ? s.open : N;
    document.getElementById('a22-cc').textContent = s ? s.close : N;
    var pathStr = s ? '"' + s.path + '"' : '""';
    document.getElementById('a22-path').textContent = pathStr;
    renderPathDisplay(s ? s.path : '', s && s.type === 'add' ? s.path.length - 1 : -1);
    renderTree(stepIdx);
    renderChips(s && s.type === 'result' ? s.path : null);
    document.getElementById('a22-prev').disabled = stepIdx <= 0;
    document.getElementById('a22-next').disabled = stepIdx >= steps.length - 1;
  }

  window.a22Reset = function () {
    results = [];
    steps = [];
    stepIdx = 0;
    generateSteps('', 0, 0);
    updateUI('Ready — ' + steps.length + ' steps');
    document.getElementById('a22-next').disabled = steps.length === 0;
  };

  window.a22Next = function () {
    if (stepIdx >= steps.length - 1) return;
    var s = steps[++stepIdx];
    if (s.type === 'result') results.push(s.path);
    var msgs = {
      add: 'Added ' + (s.branch === 'open' ? '"("' : '")"') + ' → path = ' + s.path,
      back: 'Backtrack',
      result: 'Found result: ' + s.path
    };
    updateUI(msgs[s.type]);
  };

  window.a22Prev = function () {
    if (stepIdx <= 0) return;
    var s = steps[stepIdx];
    if (s && s.type === 'result') results.pop();
    stepIdx--;
    updateUI('Step back');
  };

  window.a22Show = function () {
    document.getElementById('anim').style.display = 'block';
    a22Reset();
    setTimeout(function () { updateUI('Press Next to start'); }, 50);
  };

  // 自动显示演示区
  a22Show();
})();
</script>
