<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>算法可视化看板</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #faf7f2;
    --paper-2: #f2ede4;
    --ink: #1c1917;
    --muted: #57534e;
    --soft: #78716c;
    --rule: rgba(28,25,23,0.12);
    --accent: #b5523a;
    --accent-tint: rgba(181,82,58,0.08);
    --accent-strong: rgba(181,82,58,0.18);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); font-family: 'Geist', sans-serif; -webkit-font-smoothing: antialiased; }
  body { background-image: radial-gradient(rgba(28,25,23,0.08) 1px, transparent 1px); background-size: 22px 22px; min-height: 100vh; }

  /* ---- header ---- */
  header { background: var(--ink); color: var(--paper); padding: 48px 48px 40px; position: relative; overflow: hidden; }
  header::before { content: ''; position: absolute; inset: 0; background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 22px 22px; }
  header > * { position: relative; }
  .header-eyebrow { font-family: 'Geist Mono', monospace; font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.5; margin: 0 0 12px; }
  header h1 { font-family: 'Instrument Serif', serif; font-size: 3rem; font-weight: 400; margin: 0 0 8px; line-height: 1.1; }
  header p { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 1.1rem; opacity: 0.65; margin: 0; }
  .header-meta { display: flex; gap: 16px; margin-top: 20px; font-family: 'Geist Mono', monospace; font-size: 11px; opacity: 0.5; }

  /* ---- stats bar ---- */
  .stats-bar { display: flex; gap: 0; border-bottom: 1px solid var(--rule); background: var(--paper-2); }
  .stat { padding: 12px 24px; border-right: 1px solid var(--rule); display: flex; flex-direction: column; gap: 2px; }
  .stat:last-child { border-right: none; }
  .stat-n { font-family: 'Geist Mono', monospace; font-size: 1.5rem; font-weight: 600; color: var(--accent); line-height: 1; }
  .stat-l { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }

  /* ---- filter tabs ---- */
  .filter-bar { padding: 20px 48px 0; display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
  .filter-label { font-size: 11px; color: var(--muted); margin-right: 8px; font-family: 'Geist Mono', monospace; text-transform: uppercase; letter-spacing: 0.1em; }
  .filter-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--rule); background: var(--paper); font-size: 12px; cursor: pointer; transition: all 0.15s; color: var(--muted); font-family: 'Geist', sans-serif; }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  .filter-count { display: inline-block; background: rgba(255,255,255,0.3); border-radius: 10px; padding: 0 6px; font-size: 10px; margin-left: 4px; }

  /* ---- grid ---- */
  .container { max-width: 1200px; margin: 0 auto; padding: 24px 48px 64px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .empty-state { grid-column: 1/-1; text-align: center; padding: 64px; color: var(--muted); font-family: 'Instrument Serif', serif; font-style: italic; font-size: 1.2rem; }

  /* ---- cards ---- */
  .card { background: var(--paper-2); border: 1px solid var(--rule); border-radius: 8px; overflow: hidden; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s; text-decoration: none; color: inherit; display: block; }
  .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(28,25,23,0.1); border-color: var(--accent); }
  .card-preview { height: 120px; background: var(--paper); border-bottom: 1px solid var(--rule); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  .card-preview iframe { width: 100%; height: 100%; border: none; pointer-events: none; transform: scale(0.35); transform-origin: center; width: 285%; height: 285%; }
  .card-body { padding: 14px 16px; }
  .card-number { font-family: 'Geist Mono', monospace; font-size: 9px; color: var(--accent); letter-spacing: 0.1em; margin: 0 0 4px; }
  .card-title { font-family: 'Instrument Serif', serif; font-size: 1rem; font-weight: 400; margin: 0 0 6px; line-height: 1.3; }
  .card-tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: var(--paper); border: 1px solid var(--rule); color: var(--muted); font-family: 'Geist Mono', monospace; }

  /* ---- search ---- */
  .search-wrap { padding: 16px 48px 0; }
  .search-input { width: 100%; max-width: 320px; padding: 8px 14px; border: 1px solid var(--rule); border-radius: 6px; background: var(--paper); font-size: 13px; font-family: 'Geist', sans-serif; color: var(--ink); outline: none; transition: border-color 0.15s; }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--soft); }

  /* ---- modal ---- */
  .modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(28,25,23,0.6); backdrop-filter: blur(4px); }
  .modal.open { display: flex; align-items: center; justify-content: center; }
  .modal-box { background: var(--paper); border-radius: 12px; width: 90vw; height: 90vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 24px 64px rgba(28,25,23,0.3); }
  .modal-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid var(--rule); background: var(--paper-2); }
  .modal-title { font-family: 'Instrument Serif', serif; font-size: 1.1rem; }
  .modal-close { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--rule); background: var(--paper); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; color: var(--muted); transition: all 0.15s; }
  .modal-close:hover { background: var(--accent); border-color: var(--accent); color: white; }
  .modal-body { flex: 1; overflow: hidden; }
  .modal-body iframe { width: 100%; height: 100%; border: none; }

  /* ---- footer ---- */
  footer { text-align: center; font-size: 11px; color: var(--soft); padding: 24px 48px; border-top: 1px solid var(--rule); margin-top: 32px; }
</style>
</head>
<body>

<header>
  <p class="header-eyebrow">Algorithm Visualization Dashboard</p>
  <h1>算法可视化看板</h1>
  <p>纸笔风格图解，面试算法速查</p>
  <div class="header-meta">
    <span id="total-count"></span>
    <span>·</span>
    <span>doc/algorithm-visualizations/</span>
  </div>
</header>

<div class="stats-bar">
  <div class="stat"><span class="stat-n" id="stat-total">0</span><span class="stat-l">Total</span></div>
  <div class="stat"><span class="stat-n" id="stat-binary">0</span><span class="stat-l">Binary Tree</span></div>
  <div class="stat"><span class="stat-n" id="stat-sliding">0</span><span class="stat-l">Sliding Window</span></div>
  <div class="stat"><span class="stat-n" id="stat-dp">0</span><span class="stat-l">DP</span></div>
  <div class="stat"><span class="stat-n" id="stat-search">0</span><span class="stat-l">Search</span></div>
  <div class="stat"><span class="stat-n" id="stat-other">0</span><span class="stat-l">Other</span></div>
</div>

<div class="search-wrap">
  <input class="search-input" type="text" id="search" placeholder="搜索题号或标题..." />
</div>

<div class="filter-bar">
  <span class="filter-label">分类</span>
  <button class="filter-btn active" data-filter="all">全部<span class="filter-count" id="count-all">0</span></button>
  <button class="filter-btn" data-filter="binary-tree">二叉树<span class="filter-count" id="count-binary-tree">0</span></button>
  <button class="filter-btn" data-filter="sliding-window">滑动窗口<span class="filter-count" id="count-sliding-window">0</span></button>
  <button class="filter-btn" data-filter="binary-search">二分查找<span class="filter-count" id="count-binary-search">0</span></button>
  <button class="filter-btn" data-filter="dp">动态规划<span class="filter-count" id="count-dp">0</span></button>
  <button class="filter-btn" data-filter="heap">堆/优先队列<span class="filter-count" id="count-heap">0</span></button>
  <button class="filter-btn" data-filter="stack">栈<span class="filter-count" id="count-stack">0</span></button>
  <button class="filter-btn" data-filter="other">其他<span class="filter-count" id="count-other">0</span></button>
</div>

<div class="container">
  <div class="grid" id="grid"></div>
</div>

<!-- modal -->
<div class="modal" id="modal">
  <div class="modal-box">
    <div class="modal-head">
      <span class="modal-title" id="modal-title"></span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <iframe id="modal-iframe" src=""></iframe>
    </div>
  </div>
</div>

<footer>
  doc/algorithm-visualizations/index.html · 算法可视化看板
</footer>

<script>
const cards = [
  // { id, num, title, file, tags: [] }
  { id: 1,  num: '11',  title: '装水容器',        file: '11.container-with-most-water.html',      tags: ['two-pointer', 'sliding-window'], cat: 'other' },
  { id: 2,  num: '112', title: '路径总和',        file: '112.path-sum.html',                      tags: ['binary-tree', 'dfs'],          cat: 'binary-tree' },
  { id: 3,  num: '113', title: '路径总和 II',      file: '113.path-sum-ii.html',                   tags: ['binary-tree', 'dfs'],          cat: 'binary-tree' },
  { id: 4,  num: '146', title: 'LRU 缓存',        file: '146.lru-cache.html',                     tags: ['hash-map', 'linked-list'],     cat: 'other' },
  { id: 5,  num: '215', title: '数组第 K 大',      file: '215.kth-largest-element.html',           tags: ['heap', 'quick-select'],       cat: 'heap' },
  { id: 6,  num: '23',  title: '合并 K 个链表',    file: '23.merge-k-sorted-lists.html',          tags: ['heap', 'merge'],              cat: 'heap' },
  { id: 7,  num: '236', title: '最近公共祖先',      file: '236.lowest-common-ancestor.html',        tags: ['binary-tree', 'lca'],        cat: 'binary-tree' },
  { id: 8,  num: '239', title: '滑动窗口最大值',    file: '239.sliding-window-maximum.html',        tags: ['sliding-window', 'deque'],   cat: 'sliding-window' },
  { id: 9,  num: '257', title: '二叉树所有路径',    file: '257.binary-tree-paths.html',             tags: ['binary-tree', 'dfs'],         cat: 'binary-tree' },
  { id: 10, num: '32',  title: '最长有效括号',      file: '32.longest-valid-parentheses.html',      tags: ['stack', 'dp'],               cat: 'stack' },
  { id: 11, num: '33',  title: '旋转数组搜索',      file: '33.rotated-array-search.html',           tags: ['binary-search'],             cat: 'binary-search' },
  { id: 12, num: '34',  title: '二分查找边界',      file: '34.binary-search-boundary.html',          tags: ['binary-search'],             cat: 'binary-search' },
  { id: 13, num: '42',  title: '接雨水',           file: '42.trapping-rain-water.html',             tags: ['two-pointer', 'stack', 'dp'], cat: 'dp' },
  { id: 14, num: '617', title: '合并二叉树',        file: '617.merge-two-binary-trees.html',         tags: ['binary-tree', 'merge'],      cat: 'binary-tree' },
  { id: 15, num: '76',  title: '最小覆盖子串',      file: '76.minimum-window-substring.html',        tags: ['sliding-window', 'hash'],   cat: 'sliding-window' },
];

// category labels
const catLabel = {
  'binary-tree': '二叉树',
  'sliding-window': '滑动窗口',
  'binary-search': '二分查找',
  'dp': '动态规划',
  'heap': '堆',
  'stack': '栈',
  'other': '其他',
};

// render grid
let currentFilter = 'all';
let searchTerm = '';

function render() {
  const grid = document.getElementById('grid');
  const filtered = cards.filter(c => {
    const matchCat = currentFilter === 'all' || c.cat === currentFilter;
    const matchSearch = !searchTerm || c.title.includes(searchTerm) || c.num.includes(searchTerm);
    return matchCat && matchSearch;
  });

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state">没有找到匹配的图解</div>';
    return;
  }

  grid.innerHTML = filtered.map(c => `
    <a class="card" href="${c.file}" onclick="openModal(event, '${c.file}', '${c.num}. ${c.title}')">
      <div class="card-preview">
        <iframe src="${c.file}" loading="lazy"></iframe>
      </div>
      <div class="card-body">
        <p class="card-number">${c.num}</p>
        <h3 class="card-title">${c.title}</h3>
        <div class="card-tags">
          ${c.tags.map(t => `<span class="tag">${t}</span>`).join('')}
        </div>
      </div>
    </a>
  `).join('');
}

// stats
function updateStats() {
  const total = cards.length;
  const byCat = {};
  cards.forEach(c => { byCat[c.cat] = (byCat[c.cat] || 0) + 1; });

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-binary').textContent = byCat['binary-tree'] || 0;
  document.getElementById('stat-sliding').textContent = byCat['sliding-window'] || 0;
  document.getElementById('stat-dp').textContent = byCat['dp'] || 0;
  document.getElementById('stat-search').textContent = byCat['binary-search'] || 0;
  document.getElementById('stat-other').textContent = (byCat['other'] || 0) + (byCat['heap'] || 0) + (byCat['stack'] || 0);

  // filter counts
  document.getElementById('count-all').textContent = total;
  document.getElementById('count-binary-tree').textContent = byCat['binary-tree'] || 0;
  document.getElementById('count-sliding-window').textContent = byCat['sliding-window'] || 0;
  document.getElementById('count-binary-search').textContent = byCat['binary-search'] || 0;
  document.getElementById('count-dp').textContent = byCat['dp'] || 0;
  document.getElementById('count-heap').textContent = byCat['heap'] || 0;
  document.getElementById('count-stack').textContent = byCat['stack'] || 0;
  document.getElementById('count-other').textContent = byCat['other'] || 0;
}

// filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

// search
document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value;
  render();
});

// modal
function openModal(e, file, title) {
  e.preventDefault();
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-iframe').src = file;
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('modal-iframe').src = '';
  document.body.style.overflow = '';
}

// ESC to close
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// click outside modal-box to close
document.getElementById('modal').addEventListener('click', e => {
  if (e.target.id === 'modal') closeModal();
});

updateStats();
render();
</script>
</body>
</html>
